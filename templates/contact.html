{% extends "base.html" %}
{% block extra_css %}
<style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
</style>
{% endblock extra_css %}
{% block content %}

<div class="bg-slate-50 text-gray-800 overflow-x-hidden">

   

    <!-- Konten Utama -->
    <main>
        <!-- ============================================== -->
        <!-- "Kontak" Section                            -->
        <!-- ============================================== -->
        <!-- Diberi padding atas (pt-40) untuk memberi ruang dari navbar fixed -->
        <section id="kontak" class="py-24 pt-40 bg-slate-50">
            <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                <!-- Judul -->
                <div class="text-center mb-12">
                    <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900">Contact Us</h1>
                    <p class="mt-4 text-lg text-gray-600">Have questions or feedback? Send us a message!</p>
                </div>
                
                <!-- Formulir Kontak (Placeholder Statis) -->
                <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                    <form action="#" method="POST" class="space-y-6">
                        <!-- {{ form.as_p }} akan dirender di sini -->
                        
                        <!-- Contoh field (meniru form Django) -->
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                            <input type="text" name="name" id="name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Your Email</label>
                            <input type="email" name="email" id="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
                        </div>
                        <div>
                            <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                            <textarea name="message" id="message" rows="4" required class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500"></textarea>
                        </div>
                        
                        <!-- Tombol Submit -->
                        <div class="text-right">
                            <button type="submit" class="bg-teal-600 text-white font-semibold py-3 px-8 rounded-full shadow-lg hover:bg-teal-700 transition duration-300 ease-in-out transform hover:-translate-y-1">
                                Send Message
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    

    <!-- Script untuk Mobile Menu -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu-dropdown'); 
            if(menuButton && mobileMenu) {
                menuButton.addEventListener('click', function (event) {
                    event.stopPropagation(); 
                    mobileMenu.classList.toggle('hidden');
                });
            }
            document.addEventListener('click', function (event) {
                if (mobileMenu && !mobileMenu.classList.contains('hidden')) {
                    if (!mobileMenu.contains(event.target) && !menuButton.contains(event.target)) {
                        mobileMenu.classList.add('hidden');
                    }
                }
            });
        });
    </script>
</div>
</html>
{% endblock content %}
{% block extra_js %}

{% endblock extra_js %}
